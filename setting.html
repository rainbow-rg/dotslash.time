<!DOCTYPE html>

<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="utf-8" />
    <title>設定</title>
    <link rel="stylesheet" href="setting.css">
    <script src="setting.js" defer></script>
</head>
<body>
    <a href="index.html">⇦戻る</a>
    <br>
    <br>
    時刻の表示形式
    <select name="hyouzikeisiki" class="hyouzikeisiki" id="hyouzikeisiki">
        <option value="t24">24時間表記</option>
        <option value="t12">12時間表記</option>
    </select>
    <br>
    <br>
    背景色
    <select name="haikei" class="haikei" id="haikei">
        <option value="white">白</option>
        <option value="#F0F0F0">グレー</option>
        <option value="#E3F2FD">青</option>
        <option value="#FFE4E1">ピンク</option>
        <option value="#FCF9EF">黄</option>
        <option value="#D5FFD5">緑</option>
        <option value="#ECD7F5">紫</option>


    </select>
    <br>
    <br>
    <div class="settingbutton">
        <button id="koushin">更新</button>
        <button id="defaultbutton">デフォルトに戻す</button>
    </div>
    <br>
    <div id="kanryou" class="kanryou"></div>
</body>
</html>
